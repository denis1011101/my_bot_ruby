name: Ruby Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Ruby 4.0.1
    
    steps:
    - uses: actions/checkout@v3
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0.1'
        bundler-cache: false
    - name: Install system deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libxml2-dev libxslt1-dev zlib1g-dev
    - name: Install gems
      run: bundle install --jobs 4 --retry 3
    - name: Setup test environment
      run: |
        mkdir -p tmp/
        touch .env
        echo "TOKEN=test_token" >> .env
        echo "CHAT_ID=123456789" >> .env
    - name: Run tests
      run: bundle exec rspec
    - name: Run Rubocop
      run: bundle exec rubocop || true
